name: CI

on:
  push:
    branches: [main, redesign]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check (legacy web + pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            pipeline/package-lock.json
            web/package-lock.json

      - name: Install pipeline dependencies
        run: cd pipeline && npm ci

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Type-check pipeline
        run: cd pipeline && npx tsc --noEmit

      - name: Type-check web
        run: cd web && npx tsc --noEmit

  test-typescript:
    name: Test (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            pipeline/package-lock.json
            web/package-lock.json

      - name: Install pipeline dependencies
        run: cd pipeline && npm ci

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Test pipeline
        run: cd pipeline && npx vitest run

      - name: Test web
        run: cd web && npx vitest run

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r pipeline/aktionis/requirements.txt pytest

      - name: Run aktionis scraper tests
        run: cd pipeline/aktionis && python -m pytest

  build-frontend:
    name: Build Frontend (legacy web)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build
        run: cd web && npm run build

      - name: Verify dist exists
        run: test -d web/dist

  # ---------------------------------------------------------------------------
  # web-next/ — the v2.1 Next.js 16 build that lives at basketch-redesign.vercel.app.
  # Five jobs per v2.1 §G: lint+typecheck, vitest, build, playwright, axe (inside playwright).
  # ---------------------------------------------------------------------------
  lint-and-typecheck-web-next:
    name: web-next · Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-next/package-lock.json
      - name: Install
        run: cd web-next && npm ci
      - name: Type-check
        run: cd web-next && npx tsc --noEmit
      - name: Lint (Biome)
        run: cd web-next && npx biome check . || true   # warn-only until lint debt is paid down

  test-web-next:
    name: web-next · Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-next/package-lock.json
      - name: Install
        run: cd web-next && npm ci
      - name: Vitest
        run: cd web-next && npx vitest run

  build-web-next:
    name: web-next · Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck-web-next, test-web-next]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-next/package-lock.json
      - name: Install
        run: cd web-next && npm ci
      - name: Build
        run: cd web-next && npm run build
        env:
          # Public Supabase env — anon key is safe to commit but cleaner here
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  e2e-web-next:
    name: web-next · Playwright + axe
    runs-on: ubuntu-latest
    needs: [build-web-next]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-next/package-lock.json
      - name: Install deps
        run: cd web-next && npm ci
      - name: Install Playwright browsers (Chromium)
        run: cd web-next && npx playwright install --with-deps chromium
      - name: Build
        run: cd web-next && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Run E2E (desktop + mobile)
        run: cd web-next && npx playwright test --reporter=list
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web-next/playwright-report
          retention-days: 7
