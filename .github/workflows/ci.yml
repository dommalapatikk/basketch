name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            pipeline/package-lock.json
            web/package-lock.json

      - name: Install pipeline dependencies
        run: cd pipeline && npm ci

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Type-check pipeline
        run: cd pipeline && npx tsc --noEmit

      - name: Type-check web
        run: cd web && npx tsc --noEmit

  test-typescript:
    name: Test (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            pipeline/package-lock.json
            web/package-lock.json

      - name: Install pipeline dependencies
        run: cd pipeline && npm ci

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Test pipeline
        run: cd pipeline && npx vitest run

      - name: Test web
        run: cd web && npx vitest run

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/coop/requirements.txt pytest

      - name: Run Coop tests
        run: cd pipeline/coop && python -m pytest

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build
        run: cd web && npm run build

      - name: Verify dist exists
        run: test -d web/dist
