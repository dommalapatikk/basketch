name: Deal Pipeline

on:
  schedule:
    # Monday 05:00 UTC (07:00 Swiss) — Aldi Mon cycle, Volg general
    - cron: '0 5 * * 1'
    # Tuesday 05:00 UTC (07:00 Swiss) — Spar
    - cron: '0 5 * * 2'
    # Thursday 05:00 UTC (07:00 Swiss) — Migros, Coop, Lidl, Denner, Aldi Thu, Volg fresh
    - cron: '0 5 * * 4'
  workflow_dispatch:  # Allow manual trigger (runs all stores)

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  fetch-deals:
    name: Fetch ${{ matrix.label }} Deals
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: coop
            store: coop
            label: Coop
            # Thu launch (Thu–Wed). Also try Mon/Tue in case aktionis catches stragglers.
            days: '1,2,4'
          - slug: coop-megastore
            store: coop
            label: Coop Megastore
            days: '1,2,4'
          - slug: migros
            store: migros
            label: Migros
            # Thu launch (Thu–Wed)
            days: '4'
          - slug: lidl
            store: lidl
            label: LIDL
            # Thu launch (Thu–Wed)
            days: '4'
          - slug: aldi-suisse
            store: aldi
            label: ALDI
            # Mon + Thu dual cycle
            days: '1,4'
          - slug: denner
            store: denner
            label: Denner
            # Thu launch (Thu–Wed)
            days: '4'
          - slug: spar
            store: spar
            label: SPAR
            # Tue launch (Tue–Mon)
            days: '2'
          - slug: volg
            store: volg
            label: Volg
            # Mon (general) + Thu (fresh)
            days: '1,4'
    steps:
      - name: Check if store runs today
        id: should-run
        run: |
          DOW=$(date -u +%u)
          DAYS="${{ matrix.days }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || echo "$DAYS" | grep -q "$DOW"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.label }} — not scheduled for day $DOW"
          fi

      - uses: actions/checkout@v4
        if: steps.should-run.outputs.run == 'true'

      - uses: actions/setup-python@v5
        if: steps.should-run.outputs.run == 'true'
        with:
          python-version: '3.13'

      - name: Install dependencies
        if: steps.should-run.outputs.run == 'true'
        run: pip install -r pipeline/aktionis/requirements.txt

      - name: Fetch ${{ matrix.label }} deals
        if: steps.should-run.outputs.run == 'true'
        run: cd pipeline/aktionis && python3 main.py ${{ matrix.slug }} ${{ matrix.store }} ${{ matrix.slug }}-deals.json

      - name: Upload deals artifact
        if: always() && steps.should-run.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}-deals
          path: pipeline/aktionis/${{ matrix.slug }}-deals.json
          retention-days: 7
          if-no-files-found: ignore

  process-and-store:
    name: Categorize & Store Deals
    runs-on: ubuntu-latest
    needs: [fetch-deals]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        run: cd pipeline && npm ci

      - name: Download all deal artifacts
        uses: actions/download-artifact@v4
        with:
          path: pipeline/
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la pipeline/*-deals.json 2>/dev/null || echo "No deal files found"

      - name: Categorize and store
        env:
          WEB_REVALIDATE_URL: ${{ secrets.WEB_REVALIDATE_URL }}
          WEB_REVALIDATE_SECRET: ${{ secrets.WEB_REVALIDATE_SECRET }}
        run: cd pipeline && npx tsx run.ts

  keep-alive:
    name: Supabase Keep-Alive
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/rpc/select_1" \
            -X POST \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "204" ]; then
            echo "Keep-alive ping OK (HTTP $STATUS)"
          else
            FALLBACK=$(curl -s -o /dev/null -w "%{http_code}" \
              "${SUPABASE_URL}/rest/v1/" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
            echo "Keep-alive fallback ping (HTTP $FALLBACK)"
          fi
