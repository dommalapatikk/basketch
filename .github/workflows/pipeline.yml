name: Weekly Deal Pipeline

on:
  schedule:
    # Primary: Wednesday 21:00 UTC (22:00 CET) — after both stores publish
    - cron: "0 21 * * 3"
    # Verification: Thursday 06:00 UTC — catch late updates before peak shopping
    - cron: "0 6 * * 4"
  workflow_dispatch: # Allow manual trigger

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  fetch-migros:
    name: Fetch Migros Deals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        run: cd pipeline && npm ci

      - name: Fetch Migros deals
        run: cd pipeline && npx tsx migros/fetch.ts

      - name: Upload Migros deals artifact
        uses: actions/upload-artifact@v4
        with:
          name: migros-deals
          path: pipeline/migros-deals.json
          retention-days: 7

  fetch-coop:
    name: Fetch Coop Deals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/coop/requirements.txt

      - name: Fetch Coop deals
        run: cd pipeline/coop && python3 fetch.py

      - name: Upload Coop deals artifact
        uses: actions/upload-artifact@v4
        with:
          name: coop-deals
          path: pipeline/coop-deals.json
          retention-days: 7

  process-and-store:
    name: Categorize & Store Deals
    runs-on: ubuntu-latest
    needs: [fetch-migros, fetch-coop]
    if: always() && (needs.fetch-migros.result == 'success' || needs.fetch-coop.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        run: cd pipeline && npm ci

      - name: Download Migros deals
        uses: actions/download-artifact@v4
        with:
          name: migros-deals
          path: pipeline/
        continue-on-error: true

      - name: Download Coop deals
        uses: actions/download-artifact@v4
        with:
          name: coop-deals
          path: pipeline/
        continue-on-error: true

      - name: Categorize and store
        run: cd pipeline && npx tsx run.ts

  keep-alive:
    name: Supabase Keep-Alive
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
