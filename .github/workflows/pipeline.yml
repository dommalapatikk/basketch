name: Weekly Deal Pipeline

on:
  schedule:
    - cron: '17 21 * * 3'  # Wednesday 21:17 UTC (after stores publish, off-peak minute)
  workflow_dispatch:  # Allow manual trigger

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  fetch-deals:
    name: Fetch ${{ matrix.label }} Deals
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: coop
            store: coop
            label: Coop
          - slug: coop-megastore
            store: coop
            label: Coop Megastore
          - slug: migros
            store: migros
            label: Migros
          - slug: lidl
            store: lidl
            label: LIDL
          - slug: aldi-suisse
            store: aldi
            label: ALDI
          - slug: denner
            store: denner
            label: Denner
          - slug: spar
            store: spar
            label: SPAR
          - slug: volg
            store: volg
            label: Volg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r pipeline/aktionis/requirements.txt

      - name: Fetch ${{ matrix.label }} deals
        run: cd pipeline/aktionis && python3 main.py ${{ matrix.slug }} ${{ matrix.store }} ${{ matrix.slug }}-deals.json

      - name: Upload deals artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}-deals
          path: pipeline/aktionis/${{ matrix.slug }}-deals.json
          retention-days: 7
          if-no-files-found: ignore

  process-and-store:
    name: Categorize & Store Deals
    runs-on: ubuntu-latest
    needs: [fetch-deals]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        run: cd pipeline && npm ci

      - name: Download all deal artifacts
        uses: actions/download-artifact@v4
        with:
          path: pipeline/
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la pipeline/*-deals.json 2>/dev/null || echo "No deal files found"

      - name: Categorize and store
        run: cd pipeline && npx tsx run.ts

  keep-alive:
    name: Supabase Keep-Alive
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/rpc/select_1" \
            -X POST \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "204" ]; then
            echo "Keep-alive ping OK (HTTP $STATUS)"
          else
            FALLBACK=$(curl -s -o /dev/null -w "%{http_code}" \
              "${SUPABASE_URL}/rest/v1/" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
            echo "Keep-alive fallback ping (HTTP $FALLBACK)"
          fi
